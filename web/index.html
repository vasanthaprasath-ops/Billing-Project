<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart — Grocery Billing</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="loginScreen" class="login-screen hidden">
    <form class="login-card" id="loginForm">
        <div class="brand-logo login-logo">🛒</div>
        <h1 id="loginStoreName">FreshMart</h1>
        <div class="login-sub">Sign in to continue</div>
        <div class="field"><label for="loginUsername">Username</label>
            <input class="input" id="loginUsername" autocomplete="username" autofocus></div>
        <div class="field"><label for="loginPassword">Password</label>
            <div class="pw-wrap">
                <input class="input" id="loginPassword" type="password" autocomplete="current-password">
                <button type="button" class="pw-toggle" id="loginPwToggle" aria-label="Show password" aria-pressed="false">Show</button>
            </div></div>
        <div id="loginError" class="login-error hidden" role="alert"></div>
        <button class="btn btn-primary btn-block btn-lg" type="submit" id="loginSubmit">Sign In</button>
    </form>
</div>

<div class="app hidden" id="appRoot">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-logo">🛒</div>
            <div class="brand-text">
                <div class="brand-name" id="brandName">FreshMart</div>
                <div class="brand-sub">Billing System</div>
            </div>
        </div>

        <nav class="nav">
            <button class="nav-item active" data-view="dashboard">
                <span class="nav-ico">📊</span> Dashboard
            </button>
            <button class="nav-item" data-view="billing">
                <span class="nav-ico">🧾</span> New Bill
            </button>
            <button class="nav-item" data-view="products" id="navProducts">
                <span class="nav-ico">📦</span> Products
            </button>
            <button class="nav-item" data-view="invoices">
                <span class="nav-ico">📁</span> Invoices
            </button>
            <button class="nav-item" data-view="dayreport">
                <span class="nav-ico">🧮</span> Day Report
            </button>
            <button class="nav-item" data-view="customers" id="navCustomers">
                <span class="nav-ico">👥</span> Customers
            </button>
            <button class="nav-item" data-view="admin" id="navAdmin">
                <span class="nav-ico">⚙️</span> Admin
            </button>
            <button class="nav-item" data-view="settings">
                <span class="nav-ico">🎛️</span> Settings
            </button>
        </nav>

        <div class="sidebar-spacer"></div>

        <div class="user-box" id="userBox"></div>
        <div class="sidebar-actions">
            <button class="btn btn-ghost btn-sm btn-block" id="changePasswordBtn">Change Password</button>
            <button class="btn btn-ghost btn-sm btn-block" id="logoutBtn">Log Out</button>
        </div>
        <div class="sidebar-footer" id="storeFooter"></div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div class="topbar-heading">
                <h1 class="topbar-title" id="viewTitle">Dashboard</h1>
                <div class="topbar-sub" id="viewSub">Overview of your store</div>
            </div>
            <div class="topbar-right">
                <select class="input branch-switcher hidden" id="branchSwitcher"></select>
                <span class="status-dot"></span>
                <span id="clock" class="clock"></span>
            </div>
        </header>

        <div class="content">
            <section id="view-dashboard" class="view"></section>
            <section id="view-billing" class="view hidden"></section>
            <section id="view-products" class="view hidden"></section>
            <section id="view-invoices" class="view hidden"></section>
            <section id="view-dayreport" class="view hidden"></section>
            <section id="view-customers" class="view hidden"></section>
            <section id="view-admin" class="view hidden"></section>
            <section id="view-settings" class="view hidden"></section>
        </div>
    </main>
</div>

<div id="toastRoot" class="toast-root" role="status" aria-live="polite" aria-atomic="false"></div>
<div id="modalRoot"></div>

<script src="/js/app.js"></script>
</body>
</html>
